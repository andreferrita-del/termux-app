name: Build libtermux.so

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Permite executar manualmente

jobs:
  build:
    name: Compilar libtermux.so
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        abi:
          - armeabi-v7a
          - arm64-v8a
          - x86
          - x86_64
        include:
          - abi: armeabi-v7a
            target: armv7a-linux-androideabi
            api: 21
          - abi: arm64-v8a
            target: aarch64-linux-android
            api: 21
          - abi: x86
            target: i686-linux-android
            api: 21
          - abi: x86_64
            target: x86_64-linux-android
            api: 21

    steps:
      # ============================================
      # 1. CHECKOUT DO CÓDIGO
      # ============================================
      - name: Checkout código fonte
        uses: actions/checkout@v4

      # ============================================
      # 2. SETUP DO NDK
      # ============================================
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Verificar NDK
        run: |
          echo "NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}"
          ls -la ${{ steps.setup-ndk.outputs.ndk-path }}

      # ============================================
      # 3. PREPARAR DIRETÓRIO DE BUILD
      # ============================================
      - name: Preparar estrutura
        run: |
          mkdir -p build/${{ matrix.abi }}
          mkdir -p artifacts/${{ matrix.abi }}

      # ============================================
      # 4. COMPILAR PARA ARQUITETURA
      # ============================================
      - name: Compilar para ${{ matrix.abi }}
        run: |
          NDK_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          SYSROOT="$TOOLCHAIN/sysroot"
          
          # Define o compilador
          if [[ "${{ matrix.abi }}" == "armeabi-v7a" ]]; then
            CLANG="$TOOLCHAIN/bin/armv7a-linux-androideabi${{ matrix.api }}-clang++"
          elif [[ "${{ matrix.abi }}" == "arm64-v8a" ]]; then
            CLANG="$TOOLCHAIN/bin/aarch64-linux-android${{ matrix.api }}-clang++"
          elif [[ "${{ matrix.abi }}" == "x86" ]]; then
            CLANG="$TOOLCHAIN/bin/i686-linux-android${{ matrix.api }}-clang++"
          elif [[ "${{ matrix.abi }}" == "x86_64" ]]; then
            CLANG="$TOOLCHAIN/bin/x86_64-linux-android${{ matrix.api }}-clang++"
          fi
          
          echo "Usando compilador: $CLANG"
          
          # ===== COMPILA =====
          $CLANG \
            -std=c++14 \
            -fPIC \
            -O2 \
            -Wall \
            -Wextra \
            -Wno-unused-parameter \
            -shared \
            -I. \
            -Iterminal \
            termux.cpp terminal/pty.cpp terminal/process.cpp \
            -o build/${{ matrix.abi }}/libtermux.so \
            -lc \
            -lc++ \
            -ldl \
            -lm \
            -llog \
            -target ${{ matrix.target }}${{ matrix.api }} \
            --sysroot=$SYSROOT
          
          # Verifica se foi criado
          if [ -f "build/${{ matrix.abi }}/libtermux.so" ]; then
            echo "✅ libtermux.so criado para ${{ matrix.abi }}"
            ls -la build/${{ matrix.abi }}/libtermux.so
            file build/${{ matrix.abi }}/libtermux.so
          else
            echo "❌ Falha ao compilar para ${{ matrix.abi }}"
            exit 1
          fi

      # ============================================
      # 5. UPLOAD DO ARTEFATO
      # ============================================
      - name: Upload artefato (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: libtermux-${{ matrix.abi }}
          path: build/${{ matrix.abi }}/libtermux.so
          retention-days: 30
          if-no-files-found: error
