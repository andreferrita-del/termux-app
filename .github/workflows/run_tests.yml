name: Build libtermux.so

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar libtermux.so
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        abi:
          - armeabi-v7a
          - arm64-v8a

    steps:
      # ============================================
      # 1. CRIAR ARQUIVOS FONTE
      # ============================================
      - name: Criar estrutura de diretórios
        run: |
          mkdir -p src/terminal
          mkdir -p artifacts

      - name: Criar termux.h
        run: |
          cat > src/termux.h << 'EOF'
          #ifndef TERMUX_H
          #define TERMUX_H

          #include <jni.h>
          #include <string>
          #include <vector>

          #ifdef __cplusplus
          extern "C" {
          #endif

          JNIEXPORT jlong JNICALL
          Java_com_myTerm_terminal_NativeLib_createSubprocess(
              JNIEnv* env,
              jobject thiz,
              jobjectArray cmd,
              jobjectArray envp,
              jstring cwd,
              jintArray processId,
              jboolean usePty
          );

          JNIEXPORT void JNICALL
          Java_com_myTerm_terminal_NativeLib_closeSubprocess(
              JNIEnv* env,
              jobject thiz,
              jlong fd
          );

          JNIEXPORT jint JNICALL
          Java_com_myTerm_terminal_NativeLib_waitFor(
              JNIEnv* env,
              jobject thiz,
              jlong fd
          );

          JNIEXPORT void JNICALL
          Java_com_myTerm_terminal_NativeLib_setPtyWindowSize(
              JNIEnv* env,
              jobject thiz,
              jlong fd,
              jint cols,
              jint rows
          );

          JNIEXPORT void JNICALL
          Java_com_myTerm_terminal_NativeLib_setPtyUTF8Mode(
              JNIEnv* env,
              jobject thiz,
              jlong fd,
              jboolean utf8Mode
          );

          JNIEXPORT jstring JNICALL
          Java_com_myTerm_terminal_NativeLib_getVersion(
              JNIEnv* env,
              jobject thiz
          );

          #ifdef __cplusplus
          }
          #endif

          #endif // TERMUX_H
          EOF

      - name: Criar termux.cpp
        run: |
          cat > src/termux.cpp << 'EOF'
          #include "termux.h"
          #include <jni.h>
          #include <string>
          #include <vector>
          #include <cstring>
          #include <unistd.h>
          #include <sys/wait.h>
          #include <sys/ioctl.h>
          #include <fcntl.h>
          #include <errno.h>
          #include <cstdio>
          #include <android/log.h>

          #define LOG_TAG "TermuxNative"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)

          static std::vector<char*> convertJavaArrayToC(JNIEnv* env, jobjectArray array) {
              std::vector<char*> result;
              if (array == nullptr) return result;
              
              jsize len = env->GetArrayLength(array);
              for (int i = 0; i < len; i++) {
                  jstring str = (jstring)env->GetObjectArrayElement(array, i);
                  const char* cstr = env->GetStringUTFChars(str, nullptr);
                  char* copy = strdup(cstr);
                  result.push_back(copy);
                  env->ReleaseStringUTFChars(str, cstr);
                  env->DeleteLocalRef(str);
              }
              result.push_back(nullptr);
              return result;
          }

          static std::string getStringFromJString(JNIEnv* env, jstring jstr) {
              if (jstr == nullptr) return "";
              const char* cstr = env->GetStringUTFChars(jstr, nullptr);
              std::string result(cstr);
              env->ReleaseStringUTFChars(jstr, cstr);
              return result;
          }

          static void freeCharArray(std::vector<char*>& arr) {
              for (char* p : arr) {
                  if (p != nullptr) free(p);
              }
          }

          JNIEXPORT jlong JNICALL
          Java_com_myTerm_terminal_NativeLib_createSubprocess(
              JNIEnv* env,
              jobject thiz,
              jobjectArray cmd,
              jobjectArray envp,
              jstring cwd,
              jintArray processId,
              jboolean usePty)
          {
              LOGI("createSubprocess iniciado");
              
              try {
                  std::vector<char*> cmdArgs = convertJavaArrayToC(env, cmd);
                  std::vector<char*> envArgs = convertJavaArrayToC(env, envp);
                  std::string cwdStr = getStringFromJString(env, cwd);
                  
                  int masterFd = -1;
                  int slaveFd = -1;
                  
                  if (usePty) {
                      // Usa posix_openpt em vez de openpty
                      masterFd = posix_openpt(O_RDWR | O_NOCTTY);
                      if (masterFd == -1) {
                          LOGE("posix_openpt falhou: %s", strerror(errno));
                          freeCharArray(cmdArgs);
                          freeCharArray(envArgs);
                          return 0;
                      }
                      
                      if (grantpt(masterFd) == -1) {
                          LOGE("grantpt falhou: %s", strerror(errno));
                          close(masterFd);
                          freeCharArray(cmdArgs);
                          freeCharArray(envArgs);
                          return 0;
                      }
                      
                      if (unlockpt(masterFd) == -1) {
                          LOGE("unlockpt falhou: %s", strerror(errno));
                          close(masterFd);
                          freeCharArray(cmdArgs);
                          freeCharArray(envArgs);
                          return 0;
                      }
                      
                      char* slaveName = ptsname(masterFd);
                      if (slaveName == nullptr) {
                          LOGE("ptsname falhou: %s", strerror(errno));
                          close(masterFd);
                          freeCharArray(cmdArgs);
                          freeCharArray(envArgs);
                          return 0;
                      }
                      
                      slaveFd = open(slaveName, O_RDWR | O_NOCTTY);
                      if (slaveFd == -1) {
                          LOGE("open slave falhou: %s", strerror(errno));
                          close(masterFd);
                          freeCharArray(cmdArgs);
                          freeCharArray(envArgs);
                          return 0;
                      }
                  }
                  
                  pid_t pid = fork();
                  if (pid == -1) {
                      LOGE("Fork falhou: %s", strerror(errno));
                      freeCharArray(cmdArgs);
                      freeCharArray(envArgs);
                      return 0;
                  }
                  
                  if (pid == 0) {
                      LOGI("Processo filho iniciado (PID: %d)", getpid());
                      
                      if (usePty) {
                          setsid();
                          ioctl(slaveFd, TIOCSCTTY, 0);
                          dup2(slaveFd, STDIN_FILENO);
                          dup2(slaveFd, STDOUT_FILENO);
                          dup2(slaveFd, STDERR_FILENO);
                          close(masterFd);
                          close(slaveFd);
                      }
                      
                      if (!cwdStr.empty()) {
                          chdir(cwdStr.c_str());
                      }
                      
                      execvp(cmdArgs[0], cmdArgs.data());
                      LOGE("execvp falhou: %s", strerror(errno));
                      _exit(127);
                  }
                  
                  LOGI("Processo pai: PID=%d, masterFd=%d", pid, masterFd);
                  
                  if (processId != nullptr) {
                      jint* pidArray = env->GetIntArrayElements(processId, nullptr);
                      if (pidArray != nullptr) {
                          pidArray[0] = pid;
                          env->ReleaseIntArrayElements(processId, pidArray, 0);
                      }
                  }
                  
                  freeCharArray(cmdArgs);
                  freeCharArray(envArgs);
                  
                  return static_cast<jlong>(masterFd);
                  
              } catch (const std::exception& e) {
                  LOGE("Exceção: %s", e.what());
                  return 0;
              }
          }

          JNIEXPORT void JNICALL
          Java_com_myTerm_terminal_NativeLib_closeSubprocess(
              JNIEnv* env,
              jobject thiz,
              jlong fd)
          {
              LOGI("closeSubprocess: fd=%ld", (long)fd);
              if (fd != -1) {
                  close((int)fd);
              }
          }

          JNIEXPORT jint JNICALL
          Java_com_myTerm_terminal_NativeLib_waitFor(
              JNIEnv* env,
              jobject thiz,
              jlong fd)
          {
              LOGI("waitFor: fd=%ld", (long)fd);
              
              int status;
              pid_t result = wait(&status);
              
              if (result == -1) {
                  LOGE("wait falhou: %s", strerror(errno));
                  return -1;
              }
              
              if (WIFEXITED(status)) {
                  LOGI("Processo terminou com código: %d", WEXITSTATUS(status));
                  return WEXITSTATUS(status);
              }
              
              if (WIFSIGNALED(status)) {
                  LOGI("Processo terminou por sinal: %d", WTERMSIG(status));
                  return -WTERMSIG(status);
              }
              
              return status;
          }

          JNIEXPORT void JNICALL
          Java_com_myTerm_terminal_NativeLib_setPtyWindowSize(
              JNIEnv* env,
              jobject thiz,
              jlong fd,
              jint cols,
              jint rows)
          {
              LOGI("setPtyWindowSize: fd=%ld, cols=%d, rows=%d", (long)fd, cols, rows);
              
              if (fd != -1) {
                  struct winsize ws;
                  ws.ws_col = cols;
                  ws.ws_row = rows;
                  ws.ws_xpixel = 0;
                  ws.ws_ypixel = 0;
                  
                  if (ioctl((int)fd, TIOCSWINSZ, &ws) == -1) {
                      LOGE("ioctl TIOCSWINSZ falhou: %s", strerror(errno));
                  }
              }
          }

          JNIEXPORT void JNICALL
          Java_com_myTerm_terminal_NativeLib_setPtyUTF8Mode(
              JNIEnv* env,
              jobject thiz,
              jlong fd,
              jboolean utf8Mode)
          {
              LOGI("setPtyUTF8Mode: fd=%ld, mode=%d", (long)fd, utf8Mode);
          }

          JNIEXPORT jstring JNICALL
          Java_com_myTerm_terminal_NativeLib_getVersion(
              JNIEnv* env,
              jobject thiz)
          {
              return env->NewStringUTF("1.0.0");
          }
          EOF

      - name: Criar terminal/pty.h
        run: |
          cat > src/terminal/pty.h << 'EOF'
          #ifndef PTY_H
          #define PTY_H

          #include <unistd.h>
          #include <termios.h>

          class Pty {
          public:
              Pty();
              ~Pty();
              
              bool open();
              void close();
              
              int getMasterFd() const { return masterFd; }
              int getSlaveFd() const { return slaveFd; }
              
              bool setWindowSize(int cols, int rows);
              bool setUTF8Mode(bool enable);
              
          private:
              int masterFd;
              int slaveFd;
              struct termios originalTermios;
          };

          #endif // PTY_H
          EOF

      - name: Criar terminal/pty.cpp
        run: |
          cat > src/terminal/pty.cpp << 'EOF'
          #include "pty.h"
          #include <fcntl.h>
          #include <sys/ioctl.h>
          #include <unistd.h>
          #include <cstring>
          #include <android/log.h>
          #include <errno.h>

          #define LOG_TAG "TermuxPty"
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)

          Pty::Pty() : masterFd(-1), slaveFd(-1) {
              memset(&originalTermios, 0, sizeof(originalTermios));
          }

          Pty::~Pty() {
              close();
          }

          bool Pty::open() {
              // ===== ABRE O PTY NO ANDROID =====
              masterFd = posix_openpt(O_RDWR | O_NOCTTY);
              if (masterFd == -1) {
                  LOGE("posix_openpt falhou: %s", strerror(errno));
                  return false;
              }
              
              if (grantpt(masterFd) == -1) {
                  LOGE("grantpt falhou: %s", strerror(errno));
                  close(masterFd);
                  masterFd = -1;
                  return false;
              }
              
              if (unlockpt(masterFd) == -1) {
                  LOGE("unlockpt falhou: %s", strerror(errno));
                  close(masterFd);
                  masterFd = -1;
                  return false;
              }
              
              char* slaveName = ptsname(masterFd);
              if (slaveName == nullptr) {
                  LOGE("ptsname falhou: %s", strerror(errno));
                  close(masterFd);
                  masterFd = -1;
                  return false;
              }
              
              slaveFd = open(slaveName, O_RDWR | O_NOCTTY);
              if (slaveFd == -1) {
                  LOGE("open slave falhou: %s", strerror(errno));
                  close(masterFd);
                  masterFd = -1;
                  return false;
              }
              
              LOGI("PTY aberto: master=%d, slave=%d, name=%s", masterFd, slaveFd, slaveName);
              return true;
          }

          void Pty::close() {
              if (masterFd != -1) {
                  ::close(masterFd);
                  masterFd = -1;
              }
              if (slaveFd != -1) {
                  ::close(slaveFd);
                  slaveFd = -1;
              }
          }

          bool Pty::setWindowSize(int cols, int rows) {
              if (masterFd == -1) return false;
              
              struct winsize ws;
              ws.ws_col = cols;
              ws.ws_row = rows;
              ws.ws_xpixel = 0;
              ws.ws_ypixel = 0;
              
              return ioctl(masterFd, TIOCSWINSZ, &ws) != -1;
          }

          bool Pty::setUTF8Mode(bool enable) {
              // Implementação para UTF-8
              return true;
          }
          EOF

      - name: Criar terminal/process.h
        run: |
          cat > src/terminal/process.h << 'EOF'
          #ifndef PROCESS_H
          #define PROCESS_H

          #include <string>
          #include <vector>

          class Process {
          public:
              Process();
              ~Process();
              
              bool start(const std::vector<std::string>& cmd,
                         const std::vector<std::string>& env,
                         const std::string& cwd);
              
              bool isRunning() const;
              int waitFor();
              void kill();
              
              pid_t getPid() const { return pid; }
              
          private:
              pid_t pid;
              bool running;
          };

          #endif // PROCESS_H
          EOF

      - name: Criar terminal/process.cpp
        run: |
          cat > src/terminal/process.cpp << 'EOF'
          #include "process.h"
          #include <unistd.h>
          #include <sys/wait.h>
          #include <cstring>
          #include <android/log.h>

          #define LOG_TAG "TermuxProcess"
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)

          Process::Process() : pid(-1), running(false) {}

          Process::~Process() {
              if (running) kill();
          }

          bool Process::start(const std::vector<std::string>& cmd,
                              const std::vector<std::string>& env,
                              const std::string& cwd) {
              
              std::vector<char*> cmdArgs;
              for (const auto& s : cmd) {
                  cmdArgs.push_back(const_cast<char*>(s.c_str()));
              }
              cmdArgs.push_back(nullptr);
              
              std::vector<char*> envArgs;
              for (const auto& s : env) {
                  envArgs.push_back(const_cast<char*>(s.c_str()));
              }
              envArgs.push_back(nullptr);
              
              pid_t p = fork();
              if (p == -1) {
                  LOGE("Fork falhou");
                  return false;
              }
              
              if (p == 0) {
                  if (!cwd.empty()) {
                      chdir(cwd.c_str());
                  }
                  execvp(cmdArgs[0], cmdArgs.data());
                  _exit(127);
              }
              
              pid = p;
              running = true;
              return true;
          }

          bool Process::isRunning() const {
              if (!running || pid == -1) return false;
              int status;
              pid_t result = waitpid(pid, &status, WNOHANG);
              if (result == 0) return true;
              if (result == pid) {
                  running = false;
                  return false;
              }
              return false;
          }

          int Process::waitFor() {
              if (!running || pid == -1) return -1;
              int status;
              pid_t result = waitpid(pid, &status, 0);
              running = false;
              if (result == -1) return -1;
              if (WIFEXITED(status)) return WEXITSTATUS(status);
              return status;
          }

          void Process::kill() {
              if (running && pid != -1) {
                  ::kill(pid, SIGTERM);
                  running = false;
              }
          }
          EOF

      # ============================================
      # 2. VERIFICAR ARQUIVOS
      # ============================================
      - name: Listar arquivos criados
        run: |
          echo "📁 Estrutura de arquivos:"
          find src -type f | sort

      # ============================================
      # 3. SETUP DO NDK
      # ============================================
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: false

      # ============================================
      # 4. COMPILAR DIRETAMENTE COM CLANG
      # ============================================
      - name: Compilar para ${{ matrix.abi }}
        run: |
          NDK_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          SYSROOT="$TOOLCHAIN/sysroot"
          
          if [[ "${{ matrix.abi }}" == "armeabi-v7a" ]]; then
            CLANG="$TOOLCHAIN/bin/armv7a-linux-androideabi21-clang++"
            TARGET="armv7a-none-linux-androideabi21"
          elif [[ "${{ matrix.abi }}" == "arm64-v8a" ]]; then
            CLANG="$TOOLCHAIN/bin/aarch64-linux-android21-clang++"
            TARGET="aarch64-none-linux-android21"
          fi
          
          echo "🔨 Compilando para ${{ matrix.abi }}..."
          echo "Usando: $CLANG"
          
          cd src
          
          $CLANG \
            -std=c++14 \
            -fPIC \
            -O2 \
            -Wall \
            -Wextra \
            -Wno-unused-parameter \
            -shared \
            -I. \
            -Iterminal \
            termux.cpp terminal/pty.cpp terminal/process.cpp \
            -o ../artifacts/libtermux-${{ matrix.abi }}.so \
            -lc \
            -lc++ \
            -ldl \
            -lm \
            -llog \
            -target $TARGET \
            --sysroot=$SYSROOT
          
          cd ..
          
          if [ -f "artifacts/libtermux-${{ matrix.abi }}.so" ]; then
            echo "✅ libtermux-${{ matrix.abi }}.so criado!"
            ls -la artifacts/libtermux-${{ matrix.abi }}.so
            file artifacts/libtermux-${{ matrix.abi }}.so
          else
            echo "❌ Falha ao compilar para ${{ matrix.abi }}"
            exit 1
          fi

      # ============================================
      # 5. UPLOAD DOS ARTEFATOS
      # ============================================
      - name: Upload artefato (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: libtermux-${{ matrix.abi }}
          path: artifacts/libtermux-${{ matrix.abi }}.so
          retention-days: 30
          if-no-files-found: error
